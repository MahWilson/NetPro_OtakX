# =============================================================
# NetPilot Core — Router Inventory (NETCONF connection)
# Used by: playbooks/netconf_get.yml
# Protocol: NETCONF over SSH (port 830)
# =============================================================

[cisco]
router1 ansible_host=192.168.56.101

[cisco:vars]
# --- Login credentials ---
ansible_user=cisco
ansible_password=cisco123!

# --- NETCONF connection settings ---
ansible_connection=netconf
ansible_network_os=cisco.ios.ios
ansible_port=830

# --- SSH security settings (allows older CSR1kv ciphers) ---
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o KexAlgorithms=+diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa'
