# =============================================================
# NetPilot Core — Router Inventory (NETCONF connection)
# Used by: playbooks/netconf_get.yml
# Protocol: NETCONF over SSH (port 830)
# =============================================================

[cisco]
router1 ansible_host=192.168.56.101

[cisco:vars]
# --- Login credentials ---
ansible_user=cisco
ansible_password=cisco123!

# --- NETCONF connection settings ---
ansible_connection=netconf
ansible_network_os=cisco.ios.ios
ansible_port=830

# --- Python interpreter ---
ansible_python_interpreter=/usr/bin/python3

# --- Host key: auto-accept (for lab/CSR1kv environments) ---
# NOTE: ansible_ssh_common_args does NOT apply to the netconf connection plugin.
# Use ansible_paramiko_host_key_auto_add so ncclient/paramiko skips the known_hosts check.
ansible_paramiko_host_key_auto_add=True
