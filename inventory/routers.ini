[cisco]
router1 ansible_host=192.168.56.101

[cisco:vars]
ansible_user=cisco
ansible_password=cisco123!
ansible_connection=ansible.netcommon.network_cli
ansible_network_cli_ssh_type=libssh
ansible_network_os=cisco.ios.ios

ansible_become=yes
ansible_become_method=enable

ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o KexAlgorithms=+diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa'