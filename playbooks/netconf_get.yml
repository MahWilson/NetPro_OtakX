- name: NETCONF Device Data Retrieval
  hosts: cisco
  gather_facts: no
  connection: netconf

  tasks:

    - name: "[1/4] Get device facts via NETCONF"
      ansible.netcommon.netconf_get:
        filter: |
          <native xmlns="http://cisco.com/ns/yang/Cisco-IOS-XE-native">
            <hostname/>
            <version/>
          </native>
      register: device_facts
      ignore_errors: yes

    - name: "[1/4] Display device facts"
      debug:
        msg: "{{ device_facts.stdout | default('No data returned', true) | string | truncate(3000, False, '') }}"

    - name: "[2/4] Get interface states via NETCONF"
      ansible.netcommon.netconf_get:
        filter: |
          <interfaces-state xmlns="urn:ietf:params:xml:ns:yang:ietf-interfaces">
            <interface>
              <name/>
              <admin-status/>
              <oper-status/>
              <speed/>
            </interface>
          </interfaces-state>
      register: interface_states
      ignore_errors: yes

    - name: "[2/4] Display interface states"
      debug:
        msg: "{{ interface_states.stdout | default('No interface data returned', true) | string | truncate(3000, False, '') }}"

    - name: "[3/4] Get interface configuration via NETCONF"
      ansible.netcommon.netconf_get:
        filter: |
          <interfaces xmlns="urn:ietf:params:xml:ns:yang:ietf-interfaces">
            <interface>
              <name/>
              <description/>
              <type/>
              <enabled/>
              <ipv4 xmlns="urn:ietf:params:xml:ns:yang:ietf-ip">
                <address>
                  <ip/>
                  <prefix-length/>
                </address>
              </ipv4>
            </interface>
          </interfaces>
      register: interface_config
      ignore_errors: yes

    - name: "[3/4] Display interface configuration"
      debug:
        msg: "{{ interface_config.stdout | default('No interface config returned', true) | string | truncate(3000, False, '') }}"

    - name: "[4/4] Get full running configuration via NETCONF"
      ansible.netcommon.netconf_get:
        source: running
      register: running_config
      ignore_errors: yes

    - name: "[4/4] Display running configuration (first 3000 chars)"
      debug:
        msg: "{{ running_config.stdout | default('No running config returned', true) | string | truncate(3000, False, '') }}"

    - name: NETCONF retrieval complete
      debug:
        msg:
          - "============================================"
          - " NETCONF Data Retrieval Summary"
          - "============================================"
          - " Device Facts   : {{ 'FAILED' if device_facts.failed | default(false) else 'OK' }}"
          - " Interface State: {{ 'FAILED' if interface_states.failed | default(false) else 'OK' }}"
          - " Interface Config: {{ 'FAILED' if interface_config.failed | default(false) else 'OK' }}"
          - " Running Config  : {{ 'FAILED' if running_config.failed | default(false) else 'OK' }}"
          - "============================================"

    - name: Consolidate NETCONF data into JSON
      set_fact:
        netconf_data:
          hostname: "{{ inventory_hostname }}"
          device_facts: "{{ device_facts.stdout | default('No data returned', true) | string }}"
          interface_states: "{{ interface_states.stdout | default('No interface data returned', true) | string }}"
          interface_config: "{{ interface_config.stdout | default('No interface config returned', true) | string }}"
          running_config: "{{ running_config.stdout | default('No running config returned', true) | string }}"

    - name: Save NETCONF data as JSON
      copy:
        content: "{{ netconf_data | to_nice_json }}"
        dest: "/app/reports/{{ inventory_hostname }}_netconf.json"
      delegate_to: localhost
