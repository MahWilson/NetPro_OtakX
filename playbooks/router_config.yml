---
- name: Router Automation Configuration
  hosts: cisco
  gather_facts: no


  tasks:
    - name: Configure login banner
      cisco.ios.ios_banner:
        banner: motd
        text: |
          Unauthorized access is prohibited.
          This router is managed by NetPilot Core automation.
        state: present

    - name: Configure interface description
      cisco.ios.ios_config:
        parents: interface GigabitEthernet1
        lines:
          - description Managed by NetPilot Core Router Automation

    - name: Configure interface IP address
      cisco.ios.ios_config:
        parents: interface GigabitEthernet1
        lines:
          - ip address 192.168.56.101 255.255.255.0    

    - name: Create local user account
      cisco.ios.ios_config:
        lines:
          - username netpilot privilege 15 password 0 NetPilot123! 

    - name: Configure static route
      cisco.ios.ios_config:
        lines:
          - ip route 10.10.10.0 255.255.255.0 192.168.56.1

    - name: Retrieve router device information
      cisco.ios.ios_command:
        commands:
          - show version
          - show ip interface brief
          - show running-config | include username
          - show running-config | include banner
          - show running-config | include description
          - show running-config | include ip route
      register: router_info

    - name: Display router device information
      debug:
        var: router_info.stdout_lines      

    - name: Consolidate router automation data into JSON
      set_fact:
        router_data:
          hostname: "{{ inventory_hostname }}"
          router_info: "{{ router_info.stdout_lines | default([]) }}"

    - name: Save router automation data as JSON
      copy:
        content: "{{ router_data | to_nice_json }}"
        dest: "/app/reports/{{ inventory_hostname }}_router_backup.json"
      delegate_to: localhost
