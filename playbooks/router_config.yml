---
- name: Router Automation Configuration
  hosts: cisco
  gather_facts: no

  tasks:
    - name: Configure login banner
      cisco.ios.ios_banner:
        banner: motd
        text: |
          Unauthorized access is prohibited.
          This router is managed by NetPilot Core automation.
        state: present

    - name: Configure interface description
      cisco.ios.ios_config:
        parents: interface GigabitEthernet1
        lines:
          - description Managed by NetPilot Core Router Automation